<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MusicalVerse — 공연 등록</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--purple:#534AB7;--purple-light:#EEEDFE;--teal:#0F6E56;--teal-light:#E1F5EE;
  --red:#D94040;--red-light:#FCEBEB;--bg:#f7f7f5;--white:#fff;
  --text:#1a1a1a;--text2:#555;--text3:#999;--border:#e0e0e0;--radius:10px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh}
nav{background:var(--white);border-bottom:1px solid var(--border);
  padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100}
.nav-logo{font-size:18px;font-weight:800;color:var(--purple);cursor:pointer}
.nav-logo span{color:var(--text)}
.nav-right{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text2)}
.nav-av{width:30px;height:30px;border-radius:50%;background:var(--purple-light);
  color:var(--purple);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center}
.wrap{max-width:800px;margin:0 auto;padding:32px 24px}
.page-title{font-size:22px;font-weight:800;margin-bottom:4px}
.page-sub{font-size:13px;color:var(--text3);margin-bottom:28px}

/* 스텝 */
.steps{display:flex;align-items:center;margin-bottom:28px}
.step{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text3);flex:1}
.step:last-child{flex:0}
.step-dot{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;
  background:var(--white);flex-shrink:0}
.step.on .step-dot{border-color:var(--purple);background:var(--purple-light);color:var(--purple)}
.step.done .step-dot{border-color:var(--teal);background:var(--teal-light);color:var(--teal)}
.step.on{color:var(--purple);font-weight:700}
.step.done{color:var(--teal)}
.step-line{flex:1;height:1px;background:var(--border);margin:0 8px}
.step.done+.step-line{background:var(--teal)}

/* 카드 */
.card{background:var(--white);border-radius:14px;padding:24px;margin-bottom:16px;border:1px solid var(--border)}
.card-title{font-size:15px;font-weight:700;margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--border)}

/* 폼 */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field{margin-bottom:14px}
.lbl{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:5px;display:block}
.req{color:var(--red)}
.inp{width:100%;padding:10px 13px;font-size:14px;border:1.5px solid var(--border);
  border-radius:var(--radius);outline:none;background:var(--white);color:var(--text);transition:border-color .15s}
.inp:focus{border-color:var(--purple)}
textarea.inp{resize:vertical;min-height:80px;line-height:1.6}
select.inp{appearance:auto;background:var(--white)}
.hint{font-size:11px;color:var(--text3);margin-top:4px}

/* 장르 태그 */
.tag-wrap{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.tag{padding:6px 14px;border-radius:20px;font-size:13px;border:1.5px solid var(--border);
  cursor:pointer;color:var(--text2);background:var(--white);user-select:none}
.tag.on{background:var(--purple-light);color:var(--purple);border-color:#AFA9EC;font-weight:600}

/* 좌석 등급 */
.grade-row{display:flex;align-items:center;gap:10px;padding:10px 14px;
  border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px}
.grade-dot{width:14px;height:14px;border-radius:4px;flex-shrink:0}
.grade-name{font-size:14px;font-weight:600;flex:1}
.grade-inp{width:110px;padding:7px 10px;font-size:14px;border:1.5px solid var(--border);
  border-radius:8px;text-align:right;outline:none}
.grade-inp:focus{border-color:var(--purple)}

/* ── 업로드 존 ── */
.upload-zone{border:2px dashed var(--border);border-radius:12px;padding:24px;
  text-align:center;cursor:pointer;color:var(--text3);transition:all .15s;position:relative}
.upload-zone:hover,.upload-zone.drag{border-color:var(--purple);background:var(--purple-light)}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-zone .uz-icon{font-size:36px;display:block;margin-bottom:8px}
.upload-zone .uz-text{font-size:14px;font-weight:600;margin-bottom:4px}
.upload-zone .uz-hint{font-size:12px;color:var(--text3)}

/* 미리보기 */
.preview-wrap{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.preview-item{position:relative;width:90px;height:90px;border-radius:8px;
  overflow:hidden;border:1px solid var(--border)}
.preview-item img{width:100%;height:100%;object-fit:cover}
.preview-del{position:absolute;top:3px;right:3px;width:20px;height:20px;
  border-radius:50%;background:rgba(0,0,0,.6);color:#fff;border:none;
  cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center}

/* 업로드 진행 */
.upload-progress{margin-top:10px;display:none}
.progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:4px}
.progress-fill{height:100%;background:var(--purple);border-radius:2px;width:0;transition:width .3s}
.progress-text{font-size:12px;color:var(--text3)}

/* 알림 */
.alert{border-radius:var(--radius);padding:12px 16px;font-size:13px;margin-bottom:16px;display:none}
.alert.on{display:flex;align-items:center;gap:8px}
.alert.red{background:var(--red-light);color:var(--red)}
.alert.green{background:var(--teal-light);color:var(--teal)}
.alert.blue{background:var(--purple-light);color:var(--purple)}
.notice{background:#FAEEDA;border-radius:var(--radius);padding:12px 16px;
  font-size:13px;color:#854F0B;line-height:1.7;margin-bottom:16px}

/* 요약 */
.summary{background:var(--purple-light);border-radius:12px;padding:20px;margin-bottom:16px}
.sum-title{font-size:17px;font-weight:800;color:#3C3489;margin-bottom:2px}
.sum-sub{font-size:13px;color:var(--purple);margin-bottom:12px}
.sum-row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid rgba(83,74,183,.15)}
.sum-row:last-child{border:none}
.sum-lbl{color:var(--purple);opacity:.7}
.sum-val{font-weight:600;color:#3C3489;text-align:right;max-width:60%}
.poster-preview{width:80px;height:80px;border-radius:8px;object-fit:cover;margin-top:8px;border:1px solid var(--border)}

/* 체크 */
.chk-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;cursor:pointer;user-select:none}
.chk{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;margin-top:1px}
.chk.on{background:var(--purple);border-color:var(--purple);color:#fff}
.chk-txt{font-size:13px;color:var(--text2);line-height:1.5}

/* 버튼 */
.btn-row{display:flex;gap:12px;margin-top:8px}
.btn{padding:13px 24px;border-radius:var(--radius);font-size:14px;font-weight:700;cursor:pointer;border:none}
.btn-main{background:var(--purple);color:#fff;flex:1}
.btn-main:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{background:var(--white);border:1.5px solid var(--border);color:var(--text2)}

/* 완료 */
.done{text-align:center;padding:40px 0;display:none}
.done-icon{width:72px;height:72px;border-radius:50%;background:var(--teal-light);
  display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 16px}
.result-box{border:1px solid var(--border);border-radius:12px;padding:18px;
  text-align:left;margin:16px auto;max-width:420px}
.res-row{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px solid var(--border)}
.res-row:last-child{border:none}
.res-lbl{color:var(--text3)}
.res-val{font-weight:600}

/* 로그인 필요 */
.need-login{text-align:center;padding:60px 24px}
</style>
</head>
<body>

<nav>
  <div class="nav-logo" onclick="location.href='index.html'"><span>Musical</span>Verse</div>
  <div class="nav-right" id="nav-right">
    <span style="color:var(--text3);font-size:13px">로그인이 필요합니다</span>
  </div>
</nav>

<div class="wrap">
  <div class="alert" id="alert"></div>

  <!-- 로그인 필요 -->
  <div class="need-login" id="need-login" style="display:none">
    <div style="font-size:48px;margin-bottom:16px">🔒</div>
    <div style="font-size:20px;font-weight:800;margin-bottom:8px">로그인이 필요합니다</div>
    <div style="font-size:14px;color:var(--text2);margin-bottom:20px">공연 등록은 로그인 후 이용할 수 있습니다</div>
    <button class="btn btn-main" style="display:inline-block;width:auto;padding:12px 28px"
      onclick="location.href='index.html'">로그인 / 회원가입</button>
  </div>

  <!-- 등록 폼 -->
  <div id="reg-wrap" style="display:none">
    <div class="page-title">공연 등록</div>
    <div class="page-sub">등록 후 운영팀 검토(1–2 영업일)를 거쳐 공개됩니다</div>
    <div class="steps" id="steps"></div>
    <div id="form-content"></div>
    <div class="done" id="done-screen">
      <div class="done-icon">✓</div>
      <div style="font-size:22px;font-weight:800;margin-bottom:8px">공연 등록 신청 완료!</div>
      <div style="font-size:14px;color:var(--text2);margin-bottom:20px">운영팀 검토 후 1–2 영업일 내에 승인 결과를 알려드립니다.</div>
      <div class="result-box" id="result-box"></div>
      <div style="display:flex;gap:12px;justify-content:center;margin-top:16px">
        <button class="btn btn-ghost" onclick="location.href='index.html'">홈으로</button>
        <button class="btn btn-main" style="flex:0;padding:13px 24px" onclick="resetForm()">새 공연 등록</button>
      </div>
    </div>
  </div>
</div>

<script>
var SUPA_URL = 'https://qyrgfjshsczdpxaeznkc.supabase.co';
var SUPA_KEY = 'sb_publishable_A6MmsqE9y-ymBKNKOwR2EA_PuLX5mLB';
var sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);

var step = 1;
var user = null;
var agreed = {c1:false, c2:false};
var genres = [];
var posterFile = null;
var posterPreviewUrl = null;
var photoFiles = [];
var photoPreviews = [];
var uploadedPosterUrl = null;

var STEP_LABELS = ['기본 정보','좌석/티켓','포스터 업로드','최종 확인'];
var GENRES = ['창작 뮤지컬','라이선스 뮤지컬','소극장','가족','클래식','코미디','드라마'];

var fd = {
  title:'', date_start:'', date_end:'', time:'', venue:'',
  description:'', age_limit:'12세 이상', total_seats:'',
  price_vip:'', price_general:'', price_student:'',
  open_date:'', close_date:'', refund_policy:'공연 7일 전까지 100% 환불',
  cast_info:'', team_name:'', duration:''
};

// ── 초기화 ──
sb.auth.getSession().then(function(r){
  if(r.data && r.data.session){
    user = r.data.session.user;
    var meta = user.user_metadata||{};
    fd.team_name = meta.name||'';
    var name = meta.name||user.email.split('@')[0];
    document.getElementById('nav-right').innerHTML =
      '<div class="nav-av">'+name[0].toUpperCase()+'</div><span>'+name+'</span>';
    document.getElementById('reg-wrap').style.display='block';
    renderStep();
  } else {
    document.getElementById('need-login').style.display='block';
  }
});

// ── 스텝 렌더 ──
function renderStepBar(){
  var html='';
  STEP_LABELS.forEach(function(lbl,i){
    var cl = i+1===step?'on': i+1<step?'done':'';
    html+='<div class="step '+cl+'">'
      +'<div class="step-dot">'+(i+1<step?'✓':(i+1))+'</div>'+lbl
      +(i<3?'</div><div class="step-line"></div>':'</div>');
  });
  document.getElementById('steps').innerHTML=html;
}

function renderStep(){
  renderStepBar();
  var c = document.getElementById('form-content');
  if(step===1) c.innerHTML = renderStep1();
  else if(step===2) c.innerHTML = renderStep2();
  else if(step===3) c.innerHTML = renderStep3();
  else c.innerHTML = renderStep4();
  bindEvents();
}

// ── STEP 1 ──
function renderStep1(){
  return '<div class="card"><div class="card-title">공연 기본 정보</div>'
    +'<div class="field"><label class="lbl">공연명 <span class="req">*</span></label>'
    +'<input class="inp" id="f-title" placeholder="예: 명성황후 정기공연" value="'+esc(fd.title)+'"></div>'
    +'<div class="grid2">'
    +'<div class="field"><label class="lbl">공연 시작일 <span class="req">*</span></label>'
    +'<input class="inp" id="f-ds" type="date" value="'+esc(fd.date_start)+'"></div>'
    +'<div class="field"><label class="lbl">공연 종료일</label>'
    +'<input class="inp" id="f-de" type="date" value="'+esc(fd.date_end)+'"></div></div>'
    +'<div class="grid2">'
    +'<div class="field"><label class="lbl">공연 시간 <span class="req">*</span></label>'
    +'<input class="inp" id="f-time" placeholder="예: 19:30" value="'+esc(fd.time)+'"></div>'
    +'<div class="field"><label class="lbl">러닝타임 (분)</label>'
    +'<input class="inp" id="f-dur" placeholder="예: 150" value="'+esc(fd.duration)+'"></div></div>'
    +'<div class="field"><label class="lbl">공연 장소 <span class="req">*</span></label>'
    +'<input class="inp" id="f-venue" placeholder="공연장 이름" value="'+esc(fd.venue)+'"></div>'
    +'<div class="field"><label class="lbl">팀명</label>'
    +'<input class="inp" id="f-team" placeholder="공연팀 이름" value="'+esc(fd.team_name)+'"></div>'
    +'<div class="field"><label class="lbl">장르 <span class="req">*</span></label>'
    +'<div class="tag-wrap" id="genre-tags">'
    +GENRES.map(function(g){return '<div class="tag'+(genres.indexOf(g)>-1?' on':'')+'" data-g="'+g+'">'+g+'</div>'}).join('')
    +'</div></div>'
    +'<div class="field"><label class="lbl">공연 소개</label>'
    +'<textarea class="inp" id="f-desc" rows="4" placeholder="공연 줄거리, 특징, 관람 포인트">'+esc(fd.description)+'</textarea></div>'
    +'<div class="field"><label class="lbl">관람 등급</label>'
    +'<select class="inp" id="f-age"><option>전체 관람가</option><option>7세 이상</option>'
    +'<option'+(fd.age_limit==='12세 이상'?' selected':'')+'">12세 이상</option>'
    +'<option>15세 이상</option><option>18세 이상</option></select></div>'
    +'<div class="field"><label class="lbl">출연진 정보</label>'
    +'<textarea class="inp" id="f-cast" rows="2" placeholder="예: 김희정 (주연), 이준호 (연출)">'+esc(fd.cast_info)+'</textarea></div>'
    +'</div>'
    +'<div class="btn-row"><button class="btn btn-main" onclick="next(1)">다음 — 좌석/티켓 →</button></div>';
}

// ── STEP 2 ──
function renderStep2(){
  return '<div class="card"><div class="card-title">좌석 및 티켓 설정</div>'
    +'<div class="field"><label class="lbl">총 좌석 수 <span class="req">*</span></label>'
    +'<input class="inp" id="f-seats" type="number" placeholder="예: 300" value="'+esc(fd.total_seats)+'"></div>'
    +'<div class="field"><label class="lbl">좌석 등급 및 가격</label>'
    +'<div class="grade-row"><div class="grade-dot" style="background:#EEEDFE;border:1px solid #AFA9EC"></div>'
    +'<div class="grade-name">VIP석</div>'
    +'<input class="grade-inp" id="f-vip" type="number" placeholder="0" value="'+esc(fd.price_vip)+'"><span style="font-size:13px;color:var(--text3)">원</span></div>'
    +'<div class="grade-row"><div class="grade-dot" style="background:#E1F5EE;border:1px solid #5DCAA5"></div>'
    +'<div class="grade-name">일반석</div>'
    +'<input class="grade-inp" id="f-gen" type="number" placeholder="0" value="'+esc(fd.price_general)+'"><span style="font-size:13px;color:var(--text3)">원</span></div>'
    +'<div class="grade-row"><div class="grade-dot" style="background:#E6F1FB;border:1px solid #85B7EB"></div>'
    +'<div class="grade-name">학생석</div>'
    +'<input class="grade-inp" id="f-stu" type="number" placeholder="0" value="'+esc(fd.price_student)+'"><span style="font-size:13px;color:var(--text3)">원</span></div></div>'
    +'<div class="grid2">'
    +'<div class="field"><label class="lbl">예매 오픈일 <span class="req">*</span></label>'
    +'<input class="inp" id="f-open" type="date" value="'+esc(fd.open_date)+'">'
    +'<div class="hint">오전 10시 자동 오픈</div></div>'
    +'<div class="field"><label class="lbl">예매 마감일</label>'
    +'<input class="inp" id="f-close" type="date" value="'+esc(fd.close_date)+'"></div></div>'
    +'<div class="field"><label class="lbl">환불 정책</label>'
    +'<select class="inp" id="f-refund">'
    +'<option>공연 7일 전까지 100% 환불</option>'
    +'<option>공연 3일 전까지 100% 환불</option>'
    +'<option>공연 당일 환불 불가</option></select></div>'
    +'</div>'
    +'<div class="btn-row">'
    +'<button class="btn btn-ghost" onclick="prev()">← 이전</button>'
    +'<button class="btn btn-main" onclick="next(2)">다음 — 포스터 업로드 →</button></div>';
}

// ── STEP 3 포스터 업로드 ──
function renderStep3(){
  var posterHtml = posterPreviewUrl
    ? '<div class="preview-wrap"><div class="preview-item">'
      +'<img src="'+posterPreviewUrl+'" alt="포스터 미리보기">'
      +'<button class="preview-del" onclick="removePoster()">✕</button>'
      +'</div></div>'
    : '';
  var photosHtml = photoPreviews.map(function(url, i){
    return '<div class="preview-item"><img src="'+url+'" alt="사진'+i+'">'
      +'<button class="preview-del" onclick="removePhoto('+i+')">✕</button></div>';
  }).join('');

  return '<div class="card"><div class="card-title">포스터 및 공연 사진</div>'
    +'<div class="field"><label class="lbl">대표 포스터 <span class="req">*</span></label>'
    +'<div class="upload-zone" id="poster-zone">'
    +'<input type="file" id="poster-input" accept="image/*">'
    +'<span class="uz-icon">🎭</span>'
    +'<div class="uz-text">포스터 이미지를 끌어다 놓거나 클릭하여 선택</div>'
    +'<div class="uz-hint">JPG, PNG · 최대 10MB · 권장 600×900px</div>'
    +'</div>'
    +posterHtml
    +'<div class="upload-progress" id="poster-progress">'
    +'<div class="progress-text" id="poster-prog-text">업로드 중...</div>'
    +'<div class="progress-bar"><div class="progress-fill" id="poster-prog-fill"></div></div>'
    +'</div></div>'

    +'<div class="field" style="margin-top:16px"><label class="lbl">공연 사진 (선택, 최대 5장)</label>'
    +'<div class="upload-zone" id="photo-zone">'
    +'<input type="file" id="photo-input" accept="image/*" multiple>'
    +'<span class="uz-icon">📸</span>'
    +'<div class="uz-text">공연 사진을 끌어다 놓거나 클릭하여 선택</div>'
    +'<div class="uz-hint">JPG, PNG · 최대 5MB · 여러 장 선택 가능</div>'
    +'</div>'
    +(photosHtml?'<div class="preview-wrap">'+photosHtml+'</div>':'')
    +'</div>'

    +'<div class="field" style="margin-top:16px"><label class="lbl">홍보 영상 URL (선택)</label>'
    +'<input class="inp" id="f-video" placeholder="YouTube 또는 Vimeo URL" value=""></div>'
    +'</div>'
    +'<div class="btn-row">'
    +'<button class="btn btn-ghost" onclick="prev()">← 이전</button>'
    +'<button class="btn btn-main" onclick="next(3)">다음 — 최종 확인 →</button></div>';
}

// ── STEP 4 최종 확인 ──
function renderStep4(){
  var prices=[];
  if(fd.price_vip) prices.push('VIP '+Number(fd.price_vip).toLocaleString()+'원');
  if(fd.price_general) prices.push('일반 '+Number(fd.price_general).toLocaleString()+'원');
  if(fd.price_student) prices.push('학생 '+Number(fd.price_student).toLocaleString()+'원');

  return '<div class="summary">'
    +(posterPreviewUrl?'<img src="'+posterPreviewUrl+'" class="poster-preview" alt="포스터">':'')
    +'<div class="sum-title" style="margin-top:8px">'+esc(fd.title||'공연명 미입력')+'</div>'
    +'<div class="sum-sub">'+esc(fd.team_name||'')+'</div>'
    +[['일시',(fd.date_start||'미입력')+(fd.date_end?' – '+fd.date_end:'')+' '+fd.time],
      ['장소',fd.venue||'미입력'],
      ['장르',genres.join(', ')||'미입력'],
      ['관람 등급',fd.age_limit],
      ['총 좌석',fd.total_seats?fd.total_seats+'석':'미입력'],
      ['좌석 가격',prices.join(' / ')||'미입력'],
      ['예매 오픈',fd.open_date||'미입력'],
      ['포스터',posterFile?'✓ '+posterFile.name:'미등록']
    ].map(function(r){
      return '<div class="sum-row"><span class="sum-lbl">'+r[0]+'</span><span class="sum-val">'+esc(r[1])+'</span></div>'
    }).join('')+'</div>'
    +'<div class="notice">등록 후 운영팀 검토(1–2 영업일)를 거쳐 공개됩니다.<br>수수료는 티켓 금액의 4%가 자동 정산됩니다.</div>'
    +'<div class="card">'
    +'<div class="chk-row" onclick="toggleChk(\'c1\')"><div class="chk'+(agreed.c1?' on':'')+'" id="chk-c1">'+(agreed.c1?'✓':'')+'</div>'
    +'<div class="chk-txt">[필수] 공연 등록 및 티켓 판매 서비스 이용 약관에 동의합니다</div></div>'
    +'<div class="chk-row" onclick="toggleChk(\'c2\')"><div class="chk'+(agreed.c2?' on':'')+'" id="chk-c2">'+(agreed.c2?'✓':'')+'</div>'
    +'<div class="chk-txt">[필수] 환불 정책 및 수수료 정산 기준에 동의합니다</div></div>'
    +'</div>'
    +'<div class="btn-row">'
    +'<button class="btn btn-ghost" onclick="prev()">← 이전</button>'
    +'<button class="btn btn-main" id="btn-submit" onclick="doSubmit()">공연 등록 신청</button></div>';
}

// ── 이벤트 바인딩 ──
function bindEvents(){
  // 장르 태그
  document.querySelectorAll('[data-g]').forEach(function(el){
    el.addEventListener('click',function(){
      var g=this.dataset.g, idx=genres.indexOf(g);
      if(idx>-1) genres.splice(idx,1); else genres.push(g);
      this.classList.toggle('on', genres.indexOf(g)>-1);
    });
  });

  // 포스터 업로드
  var posterInput = document.getElementById('poster-input');
  var posterZone = document.getElementById('poster-zone');
  if(posterInput){
    posterInput.addEventListener('change', function(e){
      if(e.target.files[0]) handlePoster(e.target.files[0]);
    });
    posterZone.addEventListener('dragover',function(e){e.preventDefault();this.classList.add('drag')});
    posterZone.addEventListener('dragleave',function(){this.classList.remove('drag')});
    posterZone.addEventListener('drop',function(e){
      e.preventDefault();this.classList.remove('drag');
      if(e.dataTransfer.files[0]) handlePoster(e.dataTransfer.files[0]);
    });
  }

  // 공연 사진 업로드
  var photoInput = document.getElementById('photo-input');
  if(photoInput){
    photoInput.addEventListener('change', function(e){
      Array.from(e.target.files).forEach(function(f){ if(photoFiles.length<5) handlePhoto(f); });
    });
  }
}

// ── 포스터 처리 ──
function handlePoster(file){
  if(file.size > 10*1024*1024){showAl('파일 크기가 10MB를 초과합니다','red');return;}
  posterFile = file;
  var reader = new FileReader();
  reader.onload = function(e){
    posterPreviewUrl = e.target.result;
    renderStep();
  };
  reader.readAsDataURL(file);
}
function removePoster(){ posterFile=null; posterPreviewUrl=null; uploadedPosterUrl=null; renderStep(); }

// ── 공연 사진 처리 ──
function handlePhoto(file){
  if(file.size > 5*1024*1024){showAl('파일 크기가 5MB를 초과합니다','red');return;}
  photoFiles.push(file);
  var reader = new FileReader();
  reader.onload = function(e){ photoPreviews.push(e.target.result); renderStep(); };
  reader.readAsDataURL(file);
}
function removePhoto(i){ photoFiles.splice(i,1); photoPreviews.splice(i,1); renderStep(); }

// ── Supabase Storage 업로드 ──
function uploadPoster(){
  return new Promise(function(resolve){
    if(!posterFile){resolve(null);return;}
    var ext = posterFile.name.split('.').pop();
    var path = user.id+'/poster_'+Date.now()+'.'+ext;
    sb.storage.from('show-images').upload(path, posterFile, {
      cacheControl:'3600', upsert:false,
      contentType: posterFile.type
    }).then(function(r){
      if(r.error){showAl('포스터 업로드 실패: '+r.error.message,'red');resolve(null);return;}
      var pub = sb.storage.from('show-images').getPublicUrl(path);
      resolve(pub.data.publicUrl);
    });
  });
}

// ── 스텝 이동 ──
function next(cur){
  hideAl();
  if(cur===1){
    fd.title=val('f-title');fd.date_start=val('f-ds');fd.date_end=val('f-de');
    fd.time=val('f-time');fd.duration=val('f-dur');fd.venue=val('f-venue');
    fd.team_name=val('f-team');fd.description=val('f-desc');fd.cast_info=val('f-cast');
    var age=document.getElementById('f-age');if(age) fd.age_limit=age.value;
    fd.genre=genres.join(', ');
    if(!fd.title){showAl('공연명을 입력하세요','red');return;}
    if(!fd.date_start){showAl('공연 시작일을 입력하세요','red');return;}
    if(!fd.time){showAl('공연 시간을 입력하세요','red');return;}
    if(!fd.venue){showAl('공연 장소를 입력하세요','red');return;}
    if(genres.length===0){showAl('장르를 하나 이상 선택하세요','red');return;}
  }
  if(cur===2){
    fd.total_seats=val('f-seats');fd.price_vip=val('f-vip');
    fd.price_general=val('f-gen');fd.price_student=val('f-stu');
    fd.open_date=val('f-open');fd.close_date=val('f-close');
    var ref=document.getElementById('f-refund');if(ref) fd.refund_policy=ref.value;
    if(!fd.total_seats){showAl('총 좌석 수를 입력하세요','red');return;}
    if(!fd.open_date){showAl('예매 오픈일을 입력하세요','red');return;}
  }
  step++; renderStep(); window.scrollTo(0,0);
}
function prev(){ step--; renderStep(); window.scrollTo(0,0); }

// ── 체크박스 ──
function toggleChk(id){
  agreed[id]=!agreed[id];
  var el=document.getElementById('chk-'+id);
  if(el){el.classList.toggle('on',agreed[id]);el.textContent=agreed[id]?'✓':'';}
}

// ── 최종 등록 ──
function doSubmit(){
  if(!agreed.c1||!agreed.c2){showAl('필수 약관에 모두 동의해 주세요','red');return;}
  var btn=document.getElementById('btn-submit');
  btn.textContent='등록 중...'; btn.disabled=true;

  // 1. 포스터 업로드 후 DB 저장
  uploadPoster().then(function(posterUrl){
    var payload={
      user_id:user.id, title:fd.title, date_start:fd.date_start,
      date_end:fd.date_end||null, time:fd.time, venue:fd.venue,
      genre:fd.genre, description:fd.description, age_limit:fd.age_limit,
      total_seats:parseInt(fd.total_seats)||null,
      price_vip:parseInt(fd.price_vip)||null,
      price_general:parseInt(fd.price_general)||null,
      price_student:parseInt(fd.price_student)||null,
      open_date:fd.open_date, close_date:fd.close_date||null,
      refund_policy:fd.refund_policy, cast_info:fd.cast_info||null,
      team_name:fd.team_name||null, status:'pending',
      poster_url:posterUrl
    };
    return sb.from('shows').insert([payload]).select();
  }).then(function(r){
    btn.textContent='공연 등록 신청'; btn.disabled=false;
    if(r.error){showAl('등록 실패: '+r.error.message,'red');return;}
    var appNum='MV-'+Date.now().toString().slice(-6);
    document.getElementById('form-content').style.display='none';
    document.getElementById('steps').style.display='none';
    document.querySelector('.page-title').style.display='none';
    document.querySelector('.page-sub').style.display='none';
    document.getElementById('result-box').innerHTML=
      [['공연명',fd.title],['신청 번호',appNum],
       ['신청 일시',new Date().toLocaleDateString('ko-KR')],
       ['예매 오픈 예정',fd.open_date],
       ['포스터',uploadedPosterUrl?'업로드 완료':'미등록'],
       ['현재 상태','검토 중']
      ].map(function(row){
        return '<div class="res-row"><span class="res-lbl">'+row[0]+'</span>'
          +'<span class="res-val" style="'+(row[0]==='현재 상태'?'color:#854F0B':'')+'">'+row[1]+'</span></div>'
      }).join('');
    document.getElementById('done-screen').style.display='block';
  });
}

// ── 초기화 ──
function resetForm(){
  step=1;genres=[];agreed={c1:false,c2:false};
  posterFile=null;posterPreviewUrl=null;uploadedPosterUrl=null;
  photoFiles=[];photoPreviews=[];
  fd={title:'',date_start:'',date_end:'',time:'',venue:'',description:'',
    age_limit:'12세 이상',total_seats:'',price_vip:'',price_general:'',
    price_student:'',open_date:'',close_date:'',
    refund_policy:'공연 7일 전까지 100% 환불',cast_info:'',team_name:'',duration:''};
  document.getElementById('done-screen').style.display='none';
  document.getElementById('form-content').style.display='block';
  document.getElementById('steps').style.display='flex';
  document.querySelector('.page-title').style.display='block';
  document.querySelector('.page-sub').style.display='block';
  renderStep();
}

// ── 유틸 ──
function val(id){var e=document.getElementById(id);return e?e.value.trim():'';}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showAl(msg,type){
  var a=document.getElementById('alert');
  a.textContent=msg; a.className='alert on '+(type||'blue'); a.style.display='flex';
  window.scrollTo(0,0);
}
function hideAl(){document.getElementById('alert').style.display='none';}
</script>
